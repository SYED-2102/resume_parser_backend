<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Recruitment - Architect Tier Tester</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; background: #0f172a; color: #f8fafc; }
        .container { background: #1e293b; padding: 30px; border-radius: 12px; max-width: 600px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid #334155; }
        h2 { color: #38bdf8; margin-top: 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #94a3b8; }
        input[type="file"], input[type="number"] { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; box-sizing: border-box; }
        .weight-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .demo-box { background: #334155; padding: 15px; border-radius: 8px; border: 1px solid #38bdf8; margin-top: 20px; display: flex; align-items: center; gap: 10px; }
        button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #0ea5e9; }
        .note { font-size: 0.75rem; color: #64748b; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>System Architect: Recruitment AI</h2>
    
    <form id="analysisForm">
        
        <div class="form-group">
            <label>1. Target Job Description (PDF)</label>
            <input type="file" name="jd_pdf" accept="application/pdf" required>
        </div>

        <div class="form-group">
            <label>2. Candidate Resumes (Select up to 10)</label>
            <input type="file" name="resumes" accept="application/pdf" multiple required>
        </div>

        <label>3. Dynamic Scoring Weights (Must sum to 1.0)</label>
        <div class="weight-grid">
            <div>
                <label style="font-size: 0.7rem;">GPA (w_gpa)</label>
                <input type="number" name="w_gpa" step="0.1" value="0.3" min="0" max="1">
            </div>
            <div>
                <label style="font-size: 0.7rem;">Tech (w_tech)</label>
                <input type="number" name="w_tech" step="0.1" value="0.5" min="0" max="1">
            </div>
            <div>
                <label style="font-size: 0.7rem;">Semantic (w_sem)</label>
                <input type="number" name="w_sem" step="0.1" value="0.2" min="0" max="1">
            </div>
        </div>

        <div class="demo-box">
            <input type="checkbox" name="demo_mode" value="true" id="demo_mode">
            <label for="demo_mode" style="margin-bottom: 0; color: #38bdf8;">Enable Presentation Demo Mode</label>
        </div>
        <p class="note">⚠️ Demo mode bypasses cloud API latency and returns high-fidelity mock data instantly.</p>

        <button type="submit">Execute System Analysis</button>
    </form>
</div>
<script>
document.getElementById('analysisForm').addEventListener('submit', async function(e) {
    e.preventDefault(); 
    
    const formData = new FormData(this);
    const submitBtn = this.querySelector('button[type="submit"]');
    // Create a results div if it doesn't exist
    let resultsDiv = document.getElementById('resultsOutput');
    if (!resultsDiv) {
        resultsDiv = document.createElement('pre');
        resultsDiv.id = 'resultsOutput';
        resultsDiv.style = "background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #475569; margin-top: 20px; white-space: pre-wrap; word-wrap: break-word;";
        this.appendChild(resultsDiv);
    }

    submitBtn.innerText = "Processing... Please Wait";
    submitBtn.disabled = true;
    resultsDiv.innerText = "Loading AI Analysis...";

    try {
        const response = await fetch('http://localhost:3000/api/proxy/analyze', {         
        // http://127.0.0.1:8000/analyze-bulk
            method: 'POST',
            body: formData
        });
        
        const data = await response.json();
        // Print the JSON directly to the webpage!
        resultsDiv.innerText = JSON.stringify(data, null, 2); 
    } catch (error) {
        resultsDiv.innerText = "API ERROR: Check your Python terminal.";
    } finally {
        submitBtn.innerText = "Execute System Analysis";
        submitBtn.disabled = false;
    }
});
</script>
</body>
</html>
