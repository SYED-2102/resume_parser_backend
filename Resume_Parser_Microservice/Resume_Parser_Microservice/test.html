<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulk Resume Tester</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; background: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { margin-top: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h2>Next-Gen AI Bulk Tester</h2>
    
    <form action="http://localhost:3000/api/proxy/analyze" method="post" enctype="multipart/form-data">
        
        <label><strong>1. Target Job Description (PDF)</strong></label><br>
        <input type="file" name="jd_pdf" accept="application/pdf" required><br>

        <label><strong>2. Candidate Resumes (Select up to 10)</strong></label><br>
        <input type="file" name="resumes" accept="application/pdf" multiple required><br>

        <button type="submit">Run Bulk AI Analysis</button>
    </form>
</div>

</body>
</html>
